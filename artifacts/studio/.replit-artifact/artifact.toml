kind = "web"
previewPath = "/"
title = "3D Studio"
version = "1.0.0"
id = "artifacts/studio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18425

[services.development]
run = "pnpm --filter @workspace/studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio", "run", "build" ]
serve = "static"
publicDir = "artifacts/studio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18425"
BASE_PATH = "/"
